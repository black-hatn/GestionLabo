services:
  - type: web
    name: gestionlabo-api
    runtime: python
    # 1. Installe les dépendances
    # 2. create_all : crée les tables manquantes AVANT Alembic (évite "relation does not exist")
    # 3. alembic upgrade head : ajoute les colonnes incrémentales
    buildCommand: pip install -r requirements.txt && python -c "from app.config.database import engine; import app.models; from app.config.database import Base; Base.metadata.create_all(engine)" && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_SQLITE_DEV
        value: false
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 30
      - key: DATABASE_URL
        fromDatabase:
          name: gestionlabo-db
          property: connectionString
      # CORS : ajouter ici l'URL exacte de ton frontend Vercel
      - key: CORS_ORIGINS
        value: '["https://novabio-labo-black-hatns-projects.vercel.app","https://novabio-labo.vercel.app"]'
      # Email (optionnel — à renseigner dans le dashboard Render)
      # - key: SMTP_ENABLED
      #   value: true
      # - key: SMTP_USER
      #   value: ton-email@gmail.com
      # - key: SMTP_PASSWORD
      #   value: ton-app-password
      # - key: SMTP_FROM
      #   value: ton-email@gmail.com

databases:
  - name: gestionlabo-db
    databaseName: gestionlabo
    user: gestionlabo
